
server {
    listen       6260;
    server_name  localhost;

    # 1. 默认 Root 设置为父级目录 /data/frontend
    # 这样 /lab-project/js/... 的请求会自动映射到 /data/frontend/lab-project/js/...
    root /data/frontend;

    # 2. 核心：处理根路径访问
    # 当访问 http://ip:6260/ 时，强制内部重写到 /lab-project/index.html
    # 这样只有首页 URL 是 /，其他资源还是走 /lab-project/...
    location = / {
        rewrite ^ /lab-project/index.html break;
    }

    # 3. 处理 /lab-project 下的所有请求
    location /lab-project {
        # 这里的 root 继承自上面的 /data/frontend，所以实际路径是 /data/frontend/lab-project
        index index.html index.htm;
        
        # 兼容 History 路由模式：找不到文件时回退到 index.html
        try_files $uri $uri/ /lab-project/index.html;
    }

    # 4. 静态资源缓存（不仅匹配 /，也匹配 /lab-project 下的资源）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    access_log  /var/log/nginx/lab-project_access.log;
    error_log   /var/log/nginx/lab-project_error.log;
}
